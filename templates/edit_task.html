<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - NexTask</title>
        <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
                radial-gradient(circle at top right, rgba(34, 197, 94, 0.16), transparent 30%),
                radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.16), transparent 28%),
                linear-gradient(180deg, #020617 0%, #0f172a 55%, #111827 100%);
        }

        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.76);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 24px 80px rgba(2, 6, 23, 0.36);
        }
    </style>
</head>
<body class="min-h-screen px-4 py-8 text-slate-100">
    <div class="mx-auto grid min-h-[calc(100vh-4rem)] max-w-6xl items-center lg:grid-cols-[0.95fr_1.05fr] gap-8">
        <section class="glass rounded-[2rem] p-6 sm:p-8">
            <p class="text-sm font-semibold uppercase tracking-[0.18em] text-emerald-300">Task Editor</p>
            <h1 class="font-display mt-2 text-2xl font-bold text-white sm:text-3xl">Edit Detail Task</h1>
            <p class="mt-4 text-sm leading-7 text-slate-300">Gunakan halaman ini untuk merapikan judul, deskripsi, atau status task tanpa nuansa form standar yang terasa datar.</p>

            <div class="mt-8 grid gap-4 sm:grid-cols-2">
                <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                    <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Mode</p>
                    <p class="mt-2 font-semibold text-white">Focused editing</p>
                </div>
                <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                    <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Action</p>
                    <p class="mt-2 font-semibold text-white">Quick update</p>
                </div>
            </div>
        </section>

        <section class="glass rounded-[2rem] p-6 sm:p-8">
            <div class="mb-6">
                <p class="text-sm font-semibold uppercase tracking-[0.18em] text-sky-300">Edit Task</p>
                <h2 class="font-display mt-2 text-2xl font-bold text-white sm:text-3xl">Perbarui Task</h2>
            </div>

            <form method="POST" class="space-y-5">
                <div>
                    <label class="mb-2 block text-sm font-semibold text-slate-200">Judul Task</label>
                    <input type="text" name="title" value="{{ task.title }}" required class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-sky-400/50 focus:bg-white/8 focus:ring-2 focus:ring-sky-400/20">
                </div>
                <div>
                    <label class="mb-2 block text-sm font-semibold text-slate-200">Deskripsi Singkat</label>
                    <textarea name="description" rows="4" class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-sky-400/50 focus:bg-white/8 focus:ring-2 focus:ring-sky-400/20">{{ task.description }}</textarea>
                </div>
                <div>
                    <label class="mb-2 block text-sm font-semibold text-slate-200">Pindah Status</label>
                    <select name="status" class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-slate-100 outline-none transition focus:border-sky-400/50 focus:ring-2 focus:ring-sky-400/20">
                        <option value="todo" {% if task.status == 'todo' %}selected{% endif %}>To Do</option>
                        <option value="inprogress" {% if task.status == 'inprogress' %}selected{% endif %}>In Progress</option>
                        <option value="done" {% if task.status == 'done' %}selected{% endif %}>Done</option>
                    </select>
                </div>
                <div class="pt-3 flex gap-3">
                    <a href="{{ url_for('index') }}" class="w-1/3 rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-center font-semibold text-slate-200 transition hover:bg-white/10">Batal</a>
                    <button type="submit" class="w-2/3 rounded-2xl bg-gradient-to-r from-sky-400 via-cyan-500 to-emerald-400 px-4 py-3 font-semibold text-slate-950 shadow-lg shadow-cyan-500/20 transition hover:-translate-y-0.5 hover:shadow-cyan-500/30">Update Task</button>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
